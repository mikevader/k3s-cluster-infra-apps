---
argo-cd:

  global:
    domain: argocd.framsburg.ch
    logging:
      level: warn

  configs:
    params:
      server.insecure: true
    repositories:
      stable-helm-repo:
        name: stable
        type: helm
        url: https://charts.helm.sh/stable

    cm: # config
      kustomize.buildOptions: "--enable-helm"
      url: https://argocd.framsburg.ch
#      oidc.config: |
#        name: Authentik
#        issuer: https://authentik.framsburg.ch/application/o/argocd/
#        clientID: c579d3195f85aeccaf1ecce35ef5501e023c2a6a
#        clientSecret: $oidc.authentik.clientSecret
#        requestedScopes: ["openid", "profile", "email", "groups"]
#        logoutURL: https://authentik.framsburg.ch/application/o/argocd/end-session/
#        enableUserInfoGroups: true
#        userInfoURL: https://authentik.framsburg.ch/application/o/userinfo/
      dex.config: |
        connectors:
          - config:
              issuer: https://authentik.framsburg.ch/application/o/argocd/
              clientID: c579d3195f85aeccaf1ecce35ef5501e023c2a6a
              clientSecret: $oidc.authentik.clientSecret
              insecureEnableGroups: true
              scopes:
                - openid
                - profile
                - email
            name: authentik
            type: oidc
            id: authentik

      exec.enabled: true

      statusbadge.enabled: true

      project.links: |
        - url: https://myaudit-system.com?project={{.metadata.name}}
          title: Audit
          description: system audit logs
          icon.class: "fa-book"
      # sample application level links
      application.links: |
        - url: https://grafana.framsburg.ch/a/grafana-lokiexplore-app/explore/namespace/{{.metadata.namespace}}/logs?var-filters=namespace%7C%3D%7C{{.metadata.namespace}}
          title: Grafana
          description: System logs of namespace
          icon.class: "fa-binoculars"
      # sample resource level links
      resource.links: |
        - url: https://grafana.framsburg.ch/a/grafana-lokiexplore-app/explore/namespace/{{.resource.metadata.namespace}}/logs?var-filters=namespace%7C%3D%7C{{.resource.metadata.namespace}}
          title: Grafana
          if: resource.kind == "Deployment"
        - url: https://grafana.framsburg.ch/a/grafana-lokiexplore-app/explore/namespace/{{.resource.metadata.namespace}}/logs?var-filters=namespace%7C%3D%7C{{.resource.metadata.namespace}}&var-filters=pod%7C%3D%7C{{.resource.metadata.name}}
          title: Grafana
          if: resource.kind == "Pod"

      "resource.customizations.ignoreDifferences.argoproj.io_Application": |
        jqPathExpressions:
          - .metadata.finalizers[]? | select(. == "post-delete-finalizer.argocd.argoproj.io" or . == "post-delete-finalizer.argocd.argoproj.io/cleanup")
          - if (.metadata.finalizers | length) == 0 then .metadata.finalizers else empty end
      
      

    rbac: # rbacConfig
      policy.default: role:readonly
      policy.csv: |
        g, fb-admins, role:admin
#        p, role:org-admin, applications, *, */*, allow
#        p, role:org-admin, clusters, get, *, allow
#        p, role:org-admin, repositories, get, *, allow
#        p, role:org-admin, repositories, create, *, allow
#        p, role:org-admin, repositories, update, *, allow
#        p, role:org-admin, repositories, delete, *, allow

    # secret:
    #   githubSecret: $argocd-github-secret:webhook.github.secret
  
    # secrets:
    #   extra:
    #     webhook.github.secret: $argocd-github-secret:webhook.github.secret

  redis-ha:
    enabled: true
    exporter:
      enabled: false
  
  controller:
    replicas: 1
    dynamicClusterDistribution: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      rules:
        enabled: false

  dex:
    enabled: true
    certificateSecret:
      enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  server:
    # autoscaling:
    #   enabled: true
    #   minReplicas: 2
    replicas: 2
    env:
      - name: ARGOCD_API_SERVER_REPLICAS
        value: '2'

    extraArgs:
      - --insecure
    ingress:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  repoServer:
    replicas: 2
    # autoscaling:
    #   enabled: true
    #   minReplicas: 2
    env:
      - name: ARGOCD_EXEC_TIMEOUT
        value: '240s'
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  applicationSet:
    enabled: false
    replicaCount: 1
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  notifications:
    enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
