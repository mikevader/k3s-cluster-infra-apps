homepage:
  config:
    allowedHosts:
      - homepage.framsburg.ch

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.middlewares: authentik-authentik@kubernetescrd
    ingressClassName: traefik
    hosts:
      - host: homepage.framsburg.ch
    tls:
      - hosts: ['homepage.framsburg.ch']
        secretName: 'homepage-framsburg-ch-tls'

  resources:
    requests:
      cpu: 200m
      memory: 32Mi
    limits:
      cpu: '1'
      memory: 256Mi
