      containers:
#        - name: git-sync
#          image: registry.k8s.io/git-sync/git-sync:v4.2.4
#          env:
#            - name: GITSYNC_REPO
#              value: https://github.com/mikevader/obsidian-vault.git
#            - name: GITSYNC_REF
#              value: master
#            - name: GITSYNC_PERIOD
#              value: 30s
#            - name: GITSYNC_ROOT
#              value: /vault
#            - name: GITSYNC_LINK
#              value: current
#            - name: GITSYNC_USERNAME
#              value: mikevader
#            - name: GITSYNC_PASSWORD
#              valueFrom:
#                secretKeyRef:
#                  name: openclaw-git-token
#                  key: GITHUB_TOKEN
#          securityContext:
#            runAsUser: 1000
#            runAsGroup: 1000
#          volumeMounts:
#            - name: vault
#              mountPath: /vault
        - name: gateway
          image: ghcr.io/mikevader/openclaw:v2026.4.21
          imagePullPolicy: Always
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
            - name: google-auth
              containerPort: 41803
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: AGENT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-git-token
                  key: GITHUB_TOKEN
#            - name: ANTHROPIC_API_KEY
#              valueFrom:
#                secretKeyRef:
#                  name: openclaw-secrets
#                  key: ANTHROPIC_API_KEY
#                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MOONSHOT_API_KEY
                  optional: true
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: NVIDIA_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DISCORD_BOT_TOKEN
          envFrom:
            - secretRef:
                name: openclaw-gog
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 8Gi
              cpu: "4"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: config
              mountPath: /config
            - name: tmp-volume
              mountPath: /tmp
            - name: vault
              mountPath: /home/node/.local/obsidian-vault
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home-pvc
        - name: claude-home
          persistentVolumeClaim:
            claimName: claude-home-pvc
        - name: local-home
          persistentVolumeClaim:
            claimName: local-home-pvc
        - name: home
          persistentVolumeClaim:
            claimName: home-pvc
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp-volume
          emptyDir: {}
        - name: vault
          persistentVolumeClaim:
            claimName: vault-pvc
        - name: git-creds
          projected:
            sources:
              - secret:
                  name: vault-git-creds
                  items:
                    - key: credentials
                      path: credentials
              - configMap:
                  name: openclaw-config
                  items:
                    - key: gitconfig
                      path: gitconfig
