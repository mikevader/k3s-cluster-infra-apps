apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "k3sworker07"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.local/bin
              cp /config/vault-commit /home/node/.local/bin/vault-commit
              chmod +x /home/node/.local/bin/vault-commit
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: claude-home
              mountPath: /home/node/.claude
            - name: local-home
              mountPath: /home/node/.local
            - name: config
              mountPath: /config
        - name: vault-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              if [ ! -d /vault/.git ]; then
                git clone https://github.com:mikevader/obsidian-vault.git /vault
              fi
          env:
            - name: GIT_CONFIG_GLOBAL
              value:
                /etc/git-creds/gitconfig
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - { name: vault, mountPath: /vault }
            - { name: git-creds, mountPath: /etc/git-creds, readOnly: true }


