---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "tools": {
         "profile": "full",
        "allow": [
          "group:fs",
          "group:runtime",
          "exec"
        ],
        "fs": {
          "workspaceOnly": false
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": "${DISCORD_BOT_TOKEN}",
          "mediaMaxMb": 100,
          "allowBots": true,
          "dmPolicy": "pairing",
          "allowFrom": ["726909356209340417", "750493348363632650"],
          "guilds": {
            "750493348363632650": {
              "channels": {
                "general": {
                  "enabled": true,
                  "requireMention": true},
                "assistant": {
                  "enabled": true}
              }
            }
          }
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "nvidia-nim": {
            "baseUrl": "https://integrate.api.nvidia.com/v1",
            "apiKey": "${MOONSHOT_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "moonshotai/kimi-k2.5",
                "name": "Kimi K2.5 (NVIDIA)",
                "reasoning": false,
                "input": [
                  "text"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 200000,
                "maxTokens": 8192
              }
            ]
          }
        }
      },  
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "kimi"
          },
          "models": {
            "nvidia-nim/moonshotai/kimi-k2.5": {
              "alias": "kimi"
            }
          },
          "timeoutSeconds": 600,
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
