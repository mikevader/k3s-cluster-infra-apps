---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "sandbox": {
            "mode": "off",
            "workspaceAccess": "rw"
          },
          "workspace": "/home/node/.openclaw/workspace",
          "userTimezone": "Europe/Zurich",
          "model": {
            "primary": "claude-cli/claude-sonnet-4-6",
            "fallbacks": [ "google/gemini-3.1-pro-preview" ]
          },
          "cliBackends": {
            "claude-cli": {
              "command": "/usr/local/bin/claude"
            }
          },
          "imageGenerationModel": {
            "primary": "google/gemini-3.1-flash-image-preview"
          },
          "timeoutSeconds": 600,
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "thinkingDefault": "high",
            "reasoningDefault": "on",
            "fastModeDefault": false
          }
        ]
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": "${DISCORD_BOT_TOKEN}",
          "mediaMaxMb": 100,
          "allowBots": true,
          "dmPolicy": "pairing",
          "allowFrom": [
            "726909356209340417",
            "750493348363632650"
          ],
          "guilds": {
            "750493348363632650": {
              "channels": {
                "general": {
                  "enabled": true,
                  "requireMention": true
                },
                "assistant": {
                  "enabled": true
                }
              }
            }
          }
        }
      },
      "cron": {
        "enabled": true,
        "store": "~/.openclaw/cron/cron.json",
        "maxConcurrentRuns": 2,
        "sessionRetention": "24h",
        "runLog": {
          "maxBytes": "2mb",
          "keepLines": 2000
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token",
          "token": {
            "source": "env",
            "provider": "default",
            "id": "OPENCLAW_GATEWAY_TOKEN"
          }
        },
        "controlUi": {
          "enabled": true
        },
        "tailscale": {
          "mode": "off",
          "resetOnExit": false
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "nvidia": {
            "baseUrl": "https://integrate.api.nvidia.com/v1",
            "apiKey": "${NVIDIA_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "moonshotai/kimi-k2.5",
                "name": "Kimi K2.5 (NVIDIA)",
                "reasoning": false,
                "input": [
                  "text",
                  "image"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 262144,
                "maxTokens": 262144
              },
              {
                "id": "moonshotai/kimi-k2-thinking",
                "name": "Kimi K2 Thinking (NVIDIA)",
                "reasoning": true,
                "input": [
                  "text"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 262144,
                "maxTokens": 262144
              }
            ]
          }
        }
      },
      "tools": {
        "profile": "full",
        "allow": [
          "group:fs",
          "group:runtime",
          "exec"
        ],
        "fs": {
          "workspaceOnly": false
        },
        "web": {
          "search": {
            "provider": "gemini",
            "enabled": true
          }
        }
      },
      "plugins": {
        "entries": {
          "nvidia": {
            "enabled": true
          },
          "google": {
            "enabled": true,
            "config": {
              "webSearch": {
                "apiKey": "${GEMINI_API_KEY}"
              }
            }
          }
        }
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "hooks": {
        "internal": {
          "enabled": true,
          "entries": {
            "boot-md": {
              "enabled": true
            },
            "bootstrap-extra-files": {
              "enabled": true
            },
            "command-logger": {
              "enabled": true
            },
            "session-memory": {
              "enabled": true
            }
          }
        }
      }
    }
