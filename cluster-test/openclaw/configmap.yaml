---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "sandbox":{
            "mode": "off",
            "workspaceAccess": "rw"
          },
          "workspace": "/Users/node/.openclaw/workspace",
          "userTimezone": "Europe/Zurich",
          "model": { "primary": "nvidia/moonshotai/kimi-k2.5" },
          "models": {
            "nvidia/moonshotai/kimi-k2.5": { "alias": "Kimi K2.5" },
            "nvidia/moonshotai/kimi-k2-thinking": { "alias": "Kimi K2 Thinking" }
          },
          "timeoutSeconds": 600,
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "thinkingDefault": "high",
            "reasoningDefault": "on",
            "fastModeDefault": false
          }
        ]
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": "${DISCORD_BOT_TOKEN}",
          "mediaMaxMb": 100,
          "allowBots": true,
          "dmPolicy": "pairing",
          "allowFrom": ["726909356209340417", "750493348363632650"],
          "guilds": {
            "750493348363632650": {
              "channels": {
                "general": {
                  "enabled": true,
                  "requireMention": true},
                "assistant": {
                  "enabled": true}
              }
            }
          }
        }
      },
      "cron": {
        "enabled": true,
        "store": "~/.openclaw/cron/cron.json",
        "maxConcurrentRuns": 2,
        "sessionRetention": "24h",
        "runLog": {
          "maxBytes": "2mb",
          "keepLines": 2000
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "nvidia": {
            "baseUrl": "https://integrate.api.nvidia.com/v1",
            "apiKey": "${NVIDIA_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "kimi-k2.5",
                "name": "Kimi K2.5 (NVIDIA)",
                "reasoning": false,
                "input": [ "text", "image" ],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 262144,
                "maxTokens": 262144
              },
              {
                "id": "kimi-k2-thinking",
                "name": "Kimi K2 Thinking (NVIDIA)",
                "reasoning": true,
                "input": [ "text" ],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 262144,
                "maxTokens": 262144
              }
            ]
          }
        }
      },  
      "tools": {
        "profile": "full",
        "allow": [
          "group:fs",
          "group:runtime",
          "exec"
        ],
        "fs": {
          "workspaceOnly": false
        }
      }      
    }
