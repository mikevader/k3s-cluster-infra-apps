---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
  labels:
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/managed-by: Helm
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openclaw-secrets
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: openclaw
          app.kubernetes.io/managed-by: Helm
  data:
    - secretKey: NVIDIA_API_KEY
      remoteRef:
        key: secret/data/framsburg/openclaw
        property: moonshot_api_key
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        key: secret/data/framsburg/openclaw
        property: gateway_token
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: secret/data/framsburg/openclaw
        property: discord_bot_token
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/framsburg/openclaw
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: secret/data/framsburg/openclaw
        property: anthropic_api_key
